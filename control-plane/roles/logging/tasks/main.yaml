---
- name: Gather release versions
  setup_yaml:

- name: Check mandatory variables for this role are set
  ansible.builtin.assert:
    fail_msg: "not all mandatory variables given, check role documentation"
    quiet: true
    that:
      - logging_chart_version is defined
      - logging_chart_repo is defined
      - not logging_promtail_enabled | bool or logging_promtail_chart_version is defined
      - not logging_promtail_enabled | bool or logging_promtail_chart_repo is defined

- name: Promtail deprecation warning
  ansible.builtin.fail:
    msg: >-
      DEPRECATION: logging_promtail_enabled is true. Promtail support is deprecated
      and will be removed in a future release. Migrate to Alloy — see https://github.com/metal-stack/metal-roles/tree/main/control-plane/roles/logging#migration-from-promtail
      for instructions.
  when: logging_promtail_enabled | bool
  ignore_errors: true

- name: Create namespace {{ logging_namespace }}
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ logging_namespace }}"
        labels:
          name: "{{ logging_namespace }}"

- name: Deploy loki
  ansible.builtin.include_role:
    name: ansible-common/roles/helm-chart
  vars:
    helm_repo: "{{ logging_chart_repo }}"
    helm_chart: loki
    helm_target_namespace: "{{ logging_namespace }}"
    helm_release_name: loki
    helm_chart_version: "{{ logging_chart_version }}"
    helm_value_file_template: "loki-values.yaml"

- name: Deploy Alloy
  ansible.builtin.import_role:
    name: metal-roles/control-plane/roles/logging-common
    tasks_from: deploy-alloy.yaml
  vars:
    logging_common_alloy_namespace: "{{ logging_namespace }}"
    logging_common_alloy_chart_version: "{{ logging_alloy_chart_version }}"
    logging_common_alloy_chart_repo: "{{ logging_alloy_chart_repo }}"
    logging_common_alloy_loki_write_endpoints: "{{ logging_alloy_loki_write_endpoints | default([]) }}"
    logging_common_alloy_cluster_label: "{{ logging_alloy_cluster_label }}"
    logging_common_alloy_service_monitor_enabled: "{{ logging_alloy_service_monitor_enabled | default(false) }}"
    logging_common_alloy_prometheus_write_endpoints: "{{ logging_alloy_prometheus_write_endpoints | default([]) }}"
    logging_common_alloy_prometheus_wal_truncate_frequency: "{{ logging_alloy_prometheus_wal_truncate_frequency | default('2h') }}"
    logging_common_alloy_prometheus_wal_max_keepalive_time: "{{ logging_alloy_prometheus_wal_max_keepalive_time | default('8h') }}"
    logging_common_alloy_config_raw: "{{ logging_alloy_config_raw | default('') }}"
  when: logging_alloy_enabled

- name: Deploy Promtail (parallel migration window)
  ansible.builtin.include_role:
    name: ansible-common/roles/helm-chart
  vars:
    helm_repo: "{{ logging_promtail_chart_repo }}"
    helm_chart: "promtail"
    helm_release_name: promtail
    helm_target_namespace: "{{ logging_namespace }}"
    helm_chart_version: "{{ logging_promtail_chart_version }}"
    helm_value_file_template: "promtail-values.yaml"
  when: logging_promtail_enabled

- name: Remove Promtail
  kubernetes.core.helm:
    name: promtail
    namespace: "{{ logging_namespace }}"
    state: absent
  when: not logging_promtail_enabled | bool
