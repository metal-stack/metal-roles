---
- name: Gather release versions
  setup_yaml:

- name: Check mandatory variables for this role are set
  assert:
    fail_msg: >-
      logging_alloy_enabled and logging_promtail_enabled must be explicitly set — there
      are no defaults, to force a conscious migration decision. At least one must be true.
      Fresh install: set logging_alloy_enabled: true, logging_promtail_enabled: false.
      Existing Promtail install: set logging_promtail_enabled: true to keep current
      behavior (deprecated), then migrate to Alloy at your own pace.
      See README.md for the full migration guide.
    quiet: true
    that:
      - logging_chart_version is defined
      - logging_chart_repo is defined
      - logging_alloy_enabled is defined
      - logging_promtail_enabled is defined
      - logging_alloy_enabled | default(false) | bool or logging_promtail_enabled | default(false) | bool
      - not logging_alloy_enabled | default(false) | bool or logging_alloy_chart_version is defined
      - not logging_alloy_enabled | default(false) | bool or logging_alloy_chart_repo is defined
      - not logging_promtail_enabled | default(false) | bool or logging_promtail_chart_version is defined
      - not logging_promtail_enabled | default(false) | bool or logging_promtail_chart_repo is defined

- name: Promtail deprecation warning
  ansible.builtin.debug:
    msg: >-
      DEPRECATION: logging_promtail_enabled is true. Promtail support is deprecated
      and will be removed in a future release. Migrate to Alloy — see README.md.
  when: logging_promtail_enabled | default(false) | bool

- name: Create namespace {{ logging_namespace }}
  k8s:
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ logging_namespace }}"
        labels:
          name: "{{ logging_namespace }}"

- name: Deploy loki
  include_role:
    name: ansible-common/roles/helm-chart
  vars:
    helm_repo: "{{ logging_chart_repo }}"
    helm_chart: loki
    helm_target_namespace: "{{ logging_namespace }}"
    helm_release_name: loki
    helm_chart_version: "{{ logging_chart_version }}"
    helm_value_file_template: "loki-values.yaml"

- name: Build Alloy config
  set_fact:
    logging_alloy_config: "{{ lookup('template', 'alloy-config.alloy.j2') if (logging_alloy_config_raw | default('') | length == 0) else logging_alloy_config_raw }}"
  when: logging_alloy_enabled

- name: Deploy Alloy
  include_role:
    name: ansible-common/roles/helm-chart
  vars:
    helm_repo: "{{ logging_alloy_chart_repo }}"
    helm_chart: "alloy"
    helm_release_name: alloy
    helm_target_namespace: "{{ logging_namespace }}"
    helm_chart_version: "{{ logging_alloy_chart_version }}"
    helm_value_file_template: "alloy-values.yaml"
  when: logging_alloy_enabled

- name: Deploy Promtail (parallel migration window)
  include_role:
    name: ansible-common/roles/helm-chart
  vars:
    helm_repo: "{{ logging_promtail_chart_repo }}"
    helm_chart: "promtail"
    helm_release_name: promtail
    helm_target_namespace: "{{ logging_namespace }}"
    helm_chart_version: "{{ logging_promtail_chart_version }}"
    helm_value_file_template: "promtail-values.yaml"
  when: logging_promtail_enabled
