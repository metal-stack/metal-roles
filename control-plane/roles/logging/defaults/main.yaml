---
logging_namespace: monitoring
logging_alloy_port: 12345

# Loki push endpoints (same format as the partition alloy role)
logging_alloy_loki_write_endpoints:
  - url: "http://loki:3100/loki/api/v1/push"
  #   basic_auth:
  #     username: "promtail"
  #     password: "secret"

# Value for the cluster= external label attached to all log streams
logging_alloy_cluster_label: "{{ metal_control_plane_stage_name }}"

# Prometheus remote_write endpoints for Alloy self-metrics (prometheus.exporter.self).
# When set, Alloy scrapes its own /metrics and pushes them via remote_write.
# Typical value: the in-cluster Prometheus remote_write receiver or Thanos receive.
# Each entry: {url, remote_timeout?: duration, basic_auth?: {username, password}}
logging_alloy_prometheus_write_endpoints: []

# WAL retention for prometheus.remote_write. Controls how long undelivered samples
# are buffered on disk before being dropped during a remote endpoint outage.
# truncate_frequency: how often the WAL is compacted (default: Alloy built-in 2h)
# max_keepalive_time: samples older than this are dropped even if not yet delivered (default: Alloy built-in 8h)
logging_alloy_prometheus_wal_truncate_frequency: "2h"
logging_alloy_prometheus_wal_max_keepalive_time: "8h"

# Full Alloy River config override. When set, bypasses all structured vars above.
# logging_alloy_config_raw: |

logging_ingress_dns: "loki.{{ metal_control_plane_ingress_dns }}"
logging_ingress_loki_tls: yes
logging_ingress_loki_basic_auth_user: promtail
logging_ingress_loki_basic_auth_password:
logging_ingress_loki_basic_auth_password_salt: "{{ logging_ingress_loki_basic_auth_password | hash('sha1') | truncate(22, True, '') }}"
logging_ingress_annotations: {}
logging_loki_size: 30Gi
