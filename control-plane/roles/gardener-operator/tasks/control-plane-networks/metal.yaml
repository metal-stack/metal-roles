---
- name: Set node cidr
  ansible.builtin.set_fact:
    _gardener_runtime_cluster_node_cidr: "{{ (lookup('k8s', api_version='v1', kind='ConfigMap', namespace='kube-system', resource_name='shoot-info') | default({},
      true)).get('data', {})['nodeNetwork'] }}"

- name: Set pod cidr
  ansible.builtin.set_fact:
    _gardener_runtime_cluster_pod_cidr: "{{ (lookup('k8s', api_version='v1', kind='ConfigMap', namespace='kube-system', resource_name='shoot-info') | default({},
      true)).get('data', {})['podNetwork'] }}"

- name: Set service cidr
  ansible.builtin.set_fact:
    _gardener_runtime_cluster_service_cidr: "{{ (lookup('k8s', api_version='v1', kind='ConfigMap', namespace='kube-system', resource_name='shoot-info') | default({},
      true)).get('data', {})['serviceNetwork'] }}"
