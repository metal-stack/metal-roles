---
- name: Gather release versions
  setup_yaml:

- name: Check mandatory variables for this role are set
  ansible.builtin.assert:
    fail_msg: "not all mandatory variables given, check role documentation"
    quiet: true
    that:
      - metal_api_image_name is defined
      - metal_api_image_tag is defined
      - metal_metalctl_image_name is defined
      - metal_metalctl_image_tag is defined
      - metal_masterdata_api_image_name is defined
      - metal_masterdata_api_image_tag is defined
      - metal_masterdata_api_tls_ca is defined
      - metal_masterdata_api_tls_cert is defined
      - metal_masterdata_api_tls_cert_key is defined
      - metal_masterdata_api_tls_client_cert is defined
      - metal_masterdata_api_tls_client_key is defined
      - metal_tenant_apiserver_image_name is defined
      - metal_tenant_apiserver_image_tag is defined
      - metal_ipam_image_name is defined
      - metal_ipam_image_tag is defined
      - metal_console_image_name is defined
      - metal_console_image_tag is defined
      - metal_helm_chart_local_path is not none or metal_helm_chart is defined
      - metal_helm_chart_local_path is not none or metal_helm_chart_tag is defined
      - not metal_api_s3_enabled or metal_api_s3_address is not none
      - not metal_apiserver_enabled or metal_apiserver_oidc_client_id is not none
      - not metal_apiserver_enabled or metal_apiserver_oidc_client_secret is not none

- name: Deploy metal control plane
  ansible.builtin.include_role:
    name: ansible-common/roles/helm-chart
  vars:
    helm_chart_version: "{{ metal_helm_chart_version if metal_helm_chart_local_path is not none else metal_helm_chart_tag }}"
    helm_chart_custom_folder: "{{ metal_helm_chart_local_path | default(omit) }}"
    helm_chart: "{{ './metal-control-plane' if metal_helm_chart_local_path is not none else 'oci://' + metal_helm_chart }}"
    helm_release_name: metal-control-plane
    helm_target_namespace: "{{ metal_control_plane_namespace }}"
    helm_value_file_template: metal-values.j2
    # deployment can take a while due to post install hooks, therefore increasing the timeout for this chart...
    helm_timeout: "{{ metal_helm_chart_timeout }}"
    helm_chart_inject_config_hash: true

# After the initial metal-apiserver deployment via helm, the configured cronjob will only create the secret after 8h
# to be able to access the admin-token, create a one-off job based on the cronjob
- name: Ensure secret metal-apiserver-admin-token exists via one-off Job
  ansible.builtin.set_fact:
    secret_name: "metal-apiserver-admin-token"
    cronjob_name: "metal-apiserver-token-create"
    job_name: "metal-apiserver-token-create-initial-run"
    cacheable: yes

- name: Check if the secret already exists
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: "{{ secret_name }}"
    namespace: "{{ metal_control_plane_namespace }}"
  register: secret_lookup

- name: Get the existing CronJob definition
  kubernetes.core.k8s_info:
    api_version: batch/v1
    kind: CronJob
    name: "{{ cronjob_name }}"
    namespace: "{{ metal_control_plane_namespace }}"
  register: cronjob_lookup
  when: secret_lookup.resources | length == 0

- name: Fail if CronJob is missing and secret doesn't exist
  ansible.builtin.fail:
    msg: "CronJob {{ cronjob_name }} not found in namespace {{ namespace }}"
  when:
    - secret_lookup.resources | length == 0
    - cronjob_lookup.resources | length == 0

- name: Create Job from CronJob's jobTemplate
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: "{{ job_name }}"
        namespace: "{{ metal_control_plane_namespace }}"
        labels: "{{ cronjob_lookup.resources[0].spec.jobTemplate.metadata.labels | default({}) }}"
        annotations:
          cronjob.kubernetes.io/instantiate: "manual"
      spec: "{{ cronjob_lookup.resources[0].spec.jobTemplate.spec }}"
  when:
    - secret_lookup.resources | length == 0
    - cronjob_lookup.resources | length > 0

- name: Wait for the Job to complete
  kubernetes.core.k8s_info:
    api_version: batch/v1
    kind: Job
    name: "{{ job_name }}"
    namespace: "{{ metal_control_plane_namespace }}"
  register: job_status
  until: job_status.resources[0].status.succeeded is defined and job_status.resources[0].status.succeeded >= 1
  retries: 30
  delay: 5
  when:
    - secret_lookup.resources | length == 0
    - cronjob_lookup.resources | length > 0

- name: Report skip if secret already present
  ansible.builtin.debug:
    msg: "Secret {{ secret_name }} already exists, skipping Job creation."
  when: secret_lookup.resources | length > 0

# for automation tests, we need to wait until all the services are ready...
- name: Wait until api is available
  ansible.builtin.uri:
    url: "{{ metal_check_api_health_endpoint }}"
    follow_redirects: safe
    status_code: 200
    validate_certs: false
  register: result
  until: result is success
  retries: 60
  delay: 10
  when: metal_check_api_available
