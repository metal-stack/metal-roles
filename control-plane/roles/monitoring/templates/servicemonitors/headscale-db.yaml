apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    release: kube-prometheus-stack
  name: headscale-db
spec:
  selector:
    matchLabels:
      app: headscale-db
  namespaceSelector:
    matchNames:
    - {{ metal_control_plane_namespace }}
  endpoints:
  - port: "metrics"
    interval: 60s
