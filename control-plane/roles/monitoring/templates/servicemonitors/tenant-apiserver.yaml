apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    release: kube-prometheus-stack
  name: tenant-apiserver
spec:
  jobLabel: app
  selector:
    matchLabels:
      app: tenant-apiserver
  namespaceSelector:
    matchNames:
    - {{ metal_control_plane_namespace }}
  endpoints:
  - port: "2112"
    interval: 15s
