---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: virtual-garden-kubeconfig-refresher
  name: virtual-garden-kubeconfig-refresher
spec:
  replicas: 1
  selector:
    matchLabels:
      app: virtual-garden-kubeconfig-refresher
  template:
    metadata:
      labels:
        app: virtual-garden-kubeconfig-refresher
    spec:
      enableServiceLinks: False
      serviceAccountName: virtual-garden-kubeconfig-refresher
      containers:
      - name: refresher
        image: {{ virtual_garden_kubeconfig_refresher_image_name }}:{{ virtual_garden_kubeconfig_refresher_image_tag }}
        imagePullPolicy: {{ metal_control_plane_image_pull_policy }}
        env:
        - name: NAMESPACE
          value: "{{ monitoring_namespace }}"
        - name: TOKEN_FILE_PATH
          value: "/etc/virtual-garden-kubeconfig/token"
        - name: KUBECONFIG_FILE_PATH
          value: "/etc/virtual-garden-kubeconfig/kubeconfig"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app: virtual-garden-kubeconfig-refresher
  name: virtual-garden-kubeconfig-refresher
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    app: virtual-garden-kubeconfig-refresher
  name: virtual-garden-kubeconfig-refresher
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - create
  - update
  - watch
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    app: virtual-garden-kubeconfig-refresher
  name: virtual-garden-kubeconfig-refresher
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: virtual-garden-kubeconfig-refresher
  namespace: {{ monitoring_namespace }}
subjects:
- kind: ServiceAccount
  name: virtual-garden-kubeconfig-refresher
  namespace: {{ monitoring_namespace }}
---
# if running in same cluster as garden cluster to read
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app: virtual-garden-kubeconfig-refresher
  name: virtual-garden-kubeconfig-refresher
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - resources.gardener.cloud/v1alpha1
  resources:
  - managedresources
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - operator.gardener.cloud
  resources:
  - gardens
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app: virtual-garden-kubeconfig-refresher
  name: virtual-garden-kubeconfig-refresher
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: virtual-garden-kubeconfig-refresher
subjects:
- kind: ServiceAccount
  name: virtual-garden-kubeconfig-refresher
  namespace: {{ monitoring_namespace }}
