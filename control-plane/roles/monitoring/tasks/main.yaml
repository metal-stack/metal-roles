---
- name: Gather release versions
  setup_yaml:

- name: Check mandatory variables for this role are set
  ansible.builtin.assert:
    fail_msg: "not all mandatory variables given, check role documentation"
    quiet: true
    that:
      - rethinkdb_exporter_name is defined
      - rethinkdb_exporter_tag is defined
      - gardener_metrics_exporter_image_name is defined
      - gardener_metrics_exporter_image_tag is defined

- name: Check virtual-garden-kubeconfig-refresher cluster_provider is valid
  ansible.builtin.assert:
    fail_msg: >
      'monitoring_virtual_garden_kubeconfig_refresher_cluster_provider' must be
      one of: gcp, metalstackcloud, gardencluster. Actual value: '{{ monitoring_virtual_garden_kubeconfig_refresher_cluster_provider }}'
    quiet: true
    that:
      - monitoring_virtual_garden_kubeconfig_refresher_cluster_provider in ['gcp', 'metalstackcloud', 'gardencluster']
  when: monitoring_gardener_enabled

- name: Check deprecated variables are not set
  ansible.builtin.assert:
    fail_msg: >
      'monitoring_thanos_receive_ingress_basic_auth' has been removed.
      Please migrate to 'monitoring_thanos_receive_ingress_basic_auth_user' and
      'monitoring_thanos_receive_ingress_basic_auth_password' — the htpasswd entry
      is now generated automatically. See the Migration section in the role README.
    quiet: true
    that:
      - monitoring_thanos_receive_ingress_basic_auth is not defined or monitoring_thanos_receive_ingress_basic_auth == {}

- name: Create namespace {{ monitoring_namespace }}
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ monitoring_namespace }}"
        labels:
          name: "{{ monitoring_namespace }}"

- name: Create remote-write basic auth secrets
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Secret
      type: Opaque
      metadata:
        name: "remote-write-creds-{{ item.name }}"
        namespace: "{{ monitoring_namespace }}"
      stringData:
        username: "{{ item.username }}"
        password: "{{ item.password }}"
  loop: "{{ monitoring_prometheus_remote_write }}"
  loop_control:
    label: "{{ item.name }}"
  no_log: true

- name: Deploy kube-prometheus-stack
  ansible.builtin.include_role:
    name: ansible-common/roles/helm-chart
  vars:
    helm_repo: "{{ prometheus_stack_repo }}"
    helm_chart: kube-prometheus-stack
    helm_target_namespace: "{{ monitoring_namespace }}"
    helm_release_name: kube-prometheus-stack
    helm_chart_version: "{{ prometheus_chart_version }}"
    helm_value_file_template: "prometheus-stack-values.yaml"

- name: Deploy thanos
  ansible.builtin.include_role:
    name: ansible-common/roles/helm-chart
  vars:
    helm_repo: "{{ thanos_chart_repo }}"
    helm_chart: thanos
    helm_target_namespace: "{{ monitoring_namespace }}"
    helm_release_name: thanos
    helm_chart_version: "{{ thanos_chart_version }}"
    helm_value_file_template: "thanos-values.yaml"
  when: monitoring_thanos_enabled

- name: Deploy metrics exporters
  ansible.builtin.import_tasks: exporters.yaml
- name: Deploy Grafana dashboards
  kubernetes.core.k8s:
    definition: "{{ lookup('template', 'grafana-dashboards/' + item) }}"
    namespace: "{{ monitoring_namespace }}"
  loop:
    - machine-capacity.yaml
    - metal-api.yaml
    - rethinkdb.yaml
    - alertmanager.yaml
    - sonic-exporter.yaml
  when: monitoring_grafana_enabled

- name: Deploy Grafana dashboards for Gardener
  kubernetes.core.k8s:
    definition: "{{ lookup('template', 'grafana-dashboards/gardener/' + item) }}"
    namespace: "{{ monitoring_namespace }}"
  loop:
    - shoot-cluster-status.yaml
    - gardener-usage-overview.yaml
    - shoot-states-overview.yaml
    - shoot-customization.yaml
    - shoot-details.yaml
  when:
    - monitoring_gardener_enabled
    - monitoring_grafana_enabled

- name: Create service monitors
  kubernetes.core.k8s:
    definition: "{{ lookup('template', 'servicemonitors/' + item) }}"
    namespace: "{{ monitoring_namespace }}"
  loop:
    - ipam-db.yaml
    - masterdata-api.yaml
    - masterdata-db.yaml
    - metal-api.yaml
    - metal-db.yaml
    - metal-metrics-exporter.yaml

- name: Create service monitors for Gardener
  kubernetes.core.k8s:
    definition: "{{ lookup('template', 'servicemonitors/' + item) }}"
    namespace: "{{ monitoring_namespace }}"
  loop:
    - gardener-metrics-exporter.yaml
  when: monitoring_gardener_enabled
