---
apiVersion: operator.gardener.cloud/v1alpha1
kind: Extension
metadata:
  name: extension-shoot-networking-problemdetector
spec:
  deployment:
    extension:
      helm:
        ociRepository:
          ref: {{ gardener_extension_shoot_networking_problemdetector_helm_chart_name }}:{{ gardener_extension_shoot_networking_problemdetector_helm_chart_tag }}

      values:
        image:
          repository: "{{ gardener_extension_shoot_networking_problemdetector_image_name }}"
          tag: "{{ gardener_extension_shoot_networking_problemdetector_image_tag }}"
          pullPolicy: {{ metal_control_plane_image_pull_policy }}

        networkProblemDetector:
          defaultPeriod: 5s
          #  maxPeerNodes: 7
          #  pingEnabled: false
          k8sExporter:
            enabled: true
            # minFailingPeerNodeShare: 0.2

  resources:
  - kind: Extension
    type: shoot-networking-problemdetector
