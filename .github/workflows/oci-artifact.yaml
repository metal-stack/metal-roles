name: Publish OCI Artifact

on:
  pull_request:
    branches:
      - master
  release:
    types:
      - published
  push:
    branches:
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  draft:
    uses: metal-stack/actions-common/.github/workflows/release-drafter.yaml@v1

  oci-ansible-role:
    uses: metal-stack/actions-common/.github/workflows/oci-release-vector-artifact.yaml@oci-action
    secrets: inherit
    with:
      artifact-type: ansible-role
