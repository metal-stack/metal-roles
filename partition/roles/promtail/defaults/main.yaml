---
# Set to false during alloy migration to prevent this role from re-deploying promtail
# after alloy_migrate_stop_promtail has stopped it. Once migration is complete, remove
# this role from the playbook entirely.
promtail_enabled: true

promtail_config_host_dir: "/etc/promtail"

promtail_clients: []
promtail_scrape_configs: []

promtail_docker_log_driver: json-file
