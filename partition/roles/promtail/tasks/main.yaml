---
- name: Deprecation warning
  ansible.builtin.fail:
    msg: >-
      The promtail role is deprecated and will be removed in a future release.
      New deployments should use metal-roles/partition/roles/alloy instead - see https://github.com/metal-stack/metal-roles/tree/main/partition/roles/alloy#migration-from-promtail for instructions.
  ignore_errors: true

- name: Gather release versions
  setup_yaml:

- name: Check mandatory variables for this role are set
  assert:
    fail_msg: "not all mandatory variables given, check role documentation"
    quiet: true
    that:
      - promtail_clients
      - promtail_image_tag is defined
      - promtail_image_name is defined
      - promtail_scrape_configs is defined and (promtail_scrape_configs|length>0)
  when: promtail_enabled | default(true)

- name: Create promtail config directory
  file:
    path: "{{ promtail_config_host_dir }}"
    state: directory
    owner: "nobody"
    group: "nogroup"
    mode: "0755"
  when: promtail_enabled | default(true)

- name: Template promtail configuration file
  template:
    src: promtail.yaml.j2
    dest: "{{ promtail_config_host_dir }}/promtail.yaml"
  notify: restart promtail
  when: promtail_enabled | default(true)

- name: Deploy vrf-port-export script
  copy:
    src: vrf-port-export.py
    dest: /usr/local/bin/vrf-port-export.py
    owner: root
    group: root
    mode: "0755"
  notify: restart vrf-port-export

- name: Deploy vrf-port-export systemd service
  copy:
    src: vrf-port-export.service
    dest: /etc/systemd/system/vrf-port-export.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart vrf-port-export

- name: Ensure vrf-port-export service is started
  systemd:
    name: vrf-port-export
    enabled: yes
    state: started

- name: Deploy promtail service
  include_role:
    name: ansible-common/roles/systemd-docker-service
  vars:
    systemd_service_name: promtail
    systemd_docker_image_name: "{{ promtail_image_name }}"
    systemd_docker_image_tag: "{{ promtail_image_tag }}"
    systemd_service_after: docker.service
    systemd_service_requires: docker.service
    systemd_docker_network: host
    systemd_docker_volumes:
      - "{{ promtail_config_host_dir }}:/etc/promtail:ro"
      - "/var/log:/var/log"
      - "/var/run/docker.sock:/var/run/docker.sock"
    systemd_docker_command:
      - -config.file=/etc/promtail/promtail.yaml
    systemd_docker_log_driver: "{{ promtail_docker_log_driver }}"
  when: promtail_enabled | default(true)

- name: Stop and disable promtail service
  systemd:
    name: promtail
    state: stopped
    enabled: false
  when: promtail_migrate_stop | default(false) or promtail_migrate_cleanup | default(false)
  ignore_errors: true  # service may not exist on all hosts

- name: Remove promtail systemd unit file
  file:
    path: /etc/systemd/system/promtail.service
    state: absent
  when: promtail_migrate_cleanup | default(false)
  notify: reload systemd

- name: Remove promtail container
  community.docker.docker_container:
    name: promtail.service
    state: absent
  when: promtail_migrate_cleanup | default(false)
  ignore_errors: true  # container may not exist

- name: Remove promtail config directory
  file:
    path: "{{ promtail_config_host_dir }}"
    state: absent
  when: promtail_migrate_cleanup | default(false)

- name: Remove promtail positions file
  file:
    path: /var/log/promtail-positions.yaml
    state: absent
  when: promtail_migrate_cleanup | default(false)
