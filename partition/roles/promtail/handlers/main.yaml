---
- name: restart promtail
  service:
    name: promtail
    enabled: true
    state: restarted
  when: promtail_enabled | default(true)

- name: reload systemd
  systemd:
    daemon_reload: true

- name: restart vrf-port-export
  service:
    name: vrf-port-export
    enabled: true
    state: restarted
